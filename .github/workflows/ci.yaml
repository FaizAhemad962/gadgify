name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (frontend)
        working-directory: frontend
        run: npm ci

      - name: Build (frontend)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install (backend)
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build (backend)
        working-directory: backend
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: frontend
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Deploy Frontend to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: gadgify-ui
          package: ./frontend/dist

  deploy-backend:
    runs-on: ubuntu-latest
    needs: backend
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build backend
        working-directory: backend
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-backend
          cp -r backend/dist deploy-backend/
          cp -r backend/node_modules deploy-backend/
          cp backend/package.json deploy-backend/
          cp backend/package-lock.json deploy-backend/
          cp backend/prisma deploy-backend/ -r || true

          # Verify files exist
          echo "📋 Deployment package contents:"
          ls -la deploy-backend/
          echo ""
          echo "📋 dist/ contents:"
          ls -la deploy-backend/dist/ | head -20
          echo ""
          echo "📋 Checking entry point:"
          if [ -f deploy-backend/dist/server.js ]; then
            echo "✅ dist/server.js exists"
          else
            echo "❌ dist/server.js NOT found!"
            find deploy-backend -name "server.js" -type f
          fi
          ls -la deploy-backend/

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Deploy Backend to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: gaddgify-Backend
          package: ./deploy-backend

      - name: Wait for app to start
        run: sleep 15

      - name: Health Check
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          HEALTH_URL="https://gaddgify-backend.azurewebsites.net/health"

          echo "🔍 Checking health endpoint: $HEALTH_URL"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Health check passed (HTTP 200)"
              curl -s "$HEALTH_URL" | head -20
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ Health check attempt $ATTEMPT/$MAX_ATTEMPTS (HTTP $RESPONSE)"
            sleep 2
          done

          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          echo "📋 Troubleshooting:"
          echo "   1. Check Azure logs: https://portal.azure.com"
          echo "   2. Verify DATABASE_URL in App Service Configuration"
          echo "   3. Check PostgreSQL firewall allows Azure services"
          exit 1

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Backend deployed successfully"
          echo "📊 Health check: https://gaddgify-backend.azurewebsites.net/health"
          echo "🔄 Migrations: Applied automatically"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Backend deployment failed"
          echo "📋 Check Azure logs: https://portal.azure.com"
          echo "🔍 Run migrations manually if needed"
          exit 1
